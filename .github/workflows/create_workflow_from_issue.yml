name: Create Workflow File

on:
  issues:
    types: [opened]

jobs:
  create:
    if: contains(github.event.issue.labels.*.name, 'workflow')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: echo "Workflow déclenché"

      - name: Create markdown file
        run: |
          mkdir -p .github/workflow-definitions
          echo "# Nouveau Workflow" > .github/workflow-definitions/workflow_$(date +%s).md

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Ajout workflow depuis issue" || echo "Rien à commit"
          git push https://${{ secrets.GPAT }}@github.com/${{ github.repository }}.git HEAD:main
