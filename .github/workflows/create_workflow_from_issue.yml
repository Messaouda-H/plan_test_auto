name: Create New Workflow Definition

on:
  issues:
    types: [opened]

jobs:
  create:
    if: contains(github.event.issue.title, 'NEW WF —')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate WF-XXX.md
        run: |
          NUMBER=$(echo "${{ github.event.issue.title }}" | grep -o 'WF-[0-9]*')
          TITLE="${{ github.event.issue.title }}"
          TITLE="${TITLE#NEW WF — }"

          cat > ".github/workflow-definitions/${NUMBER}.md" << EOF
          # ${NUMBER} — ${TITLE}

          ## Objectif
          ${{ github.event.issue.body | grep -A 999 '## Objectif' | sed '1d' | head -n 20 }}

          ## Checklist
          ${{ github.event.issue.body | grep -A 999 '## Checklist' | sed '1d' | head -n 50 }}

          ## Notes
          ${{ github.event.issue.body | grep -A 999 '## Notes' | sed '1d' | head -n 20 }}
          EOF

      - name: Commit new workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ".github/workflow-definitions/"
          git commit -m "feat: add new workflow ${{ github.event.issue.title }}" || echo "No change"
          git push

      - name: Close creation issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            })