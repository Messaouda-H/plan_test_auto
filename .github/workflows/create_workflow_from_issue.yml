name: Create Workflow File

on:
  issues:
    types: [opened]

jobs:
  create:
    if: contains(github.event.issue.title, '[WORKFLOW]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create markdown file
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            const nameMatch = issue.body.match(/Nom du workflow\s*\n(.+)/);
            const checklistMatch = issue.body.match(/Checklist\s*\n([\s\S]+)/);

            const name = nameMatch ? nameMatch[1].trim() : "WF-new";
            const checklist = checklistMatch ? checklistMatch[1] : "";

            const filename = `.github/workflow-definitions/${name.replace(/[^a-z0-9]/gi,'_')}.md`;

            const content = `# ${name}

            ## Checklist
            ${checklist}
            `;

            const fs = require('fs');
            fs.writeFileSync(filename, content);

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Ajout workflow depuis issue"
          git push https://${{ secrets.GPAT }}@github.com/${{ github.repository }}.git HEAD:main