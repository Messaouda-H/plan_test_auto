name: Generate QA Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install @octokit/rest docx

      - run: node .github/Scripts/generate_report.js

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reports/
          git commit -m "Generate QA report" || echo "No changes"
          git push