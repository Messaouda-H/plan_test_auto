name: 📄 Generate All QA Reports (DOCX)

on:
  # Déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

  # Optionnel : se relance automatiquement quand une issue est créée ou modifiée
  # issues:
  #   types: [opened, edited, labeled, unlabeled, closed, reopened]

permissions:
  contents: write
  issues: read

jobs:
  generate-all-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Récupère tout l'historique pour éviter les conflits de push
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cat > package.json << 'EOF'
          {
            "name": "halyzia-report-generator",
            "version": "1.0.0",
            "type": "module",
            "dependencies": {
              "@octokit/rest": "^20.1.1",
              "docx": "^8.5.0"
            }
          }
          EOF
          npm install

      - name: Ensure reports directory exists
        run: mkdir -p reports

      - name: Generate all DOCX reports
        run: node .github/Scripts/generate_report.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: List generated reports
        run: |
          echo "📁 Rapports générés :"
          ls -lh reports/*.docx 2>/dev/null || echo "Aucun fichier .docx trouvé"

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull rebase pour éviter le rejet si le remote a avancé
          git pull --rebase origin main

          git add reports/
          git diff --cached --quiet && echo "✅ Aucun changement à committer" && exit 0

          git commit -m "📄 Mise à jour des rapports QA Halyzia — $(date +'%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git