name: Creer un nouveau workflow de test

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Nom du workflow (ex: WF-15 — Nouveau test)"
        required: true
        type: string
      objectif:
        description: "Objectif du workflow"
        required: false
        type: string
      checklist:
        description: "Etapes (une par ligne, commencer par - [ ])"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GPAT }}

      - name: Creer le fichier .md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const name      = `${{ github.event.inputs.name }}`;
            const objectif  = `${{ github.event.inputs.objectif }}`;
            const checklist = `${{ github.event.inputs.checklist }}`;

            // Generer un nom de fichier propre
            const safeName = name
              .replace(/[^a-z0-9\-_]/gi, '_')
              .replace(/_+/g, '_')
              .replace(/^_|_$/g, '');

            const dir = '.github/workflow-definitions';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });

            const filepath = path.join(dir, `${safeName}.md`);

            const content = [
              `# ${name}`,
              '',
              objectif ? `## Objectif\n${objectif}\n` : '',
              '## Checklist',
              checklist,
              '',
            ].filter(l => l !== null).join('\n');

            fs.writeFileSync(filepath, content, 'utf-8');
            console.log(`Fichier cree : ${filepath}`);

      - name: Commit et push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .github/workflow-definitions/
          git diff --staged --quiet && echo "Rien a committer" && exit 0
          git commit -m "feat: nouveau workflow — ${{ github.event.inputs.name }}"
          git push https://${{ secrets.GPAT }}@github.com/${{ github.repository }}.git HEAD:main