name: Create Test Session File

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create-test-session:
    if: contains(github.event.issue.title, '[TEST SESSION]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # PARSING ET EXTRACTION PAR SECTION
      - name: Extract and Filter Fields
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            function getCheckedOnly(text) {
              if (!text) return "";
              return text.split('\n')
                .filter(line => line.includes('[x]'))
                .join('\n')
                .trim();
            }

            // On extrait chaque bloc séparément pour garder la structure
            const data = {
              testeur: extract("Testeur"),
              date: extract("Date du test"),
              version: extract("Version testée"),
              notes: extract("Notes et Observations"),
              wf1: getCheckedOnly(extract("Workflow 1 : NEW + Détections complètes")),
              wf2: getCheckedOnly(extract("Workflow 2 : Bipolaire + Ripples/FR")),
              wf3: getCheckedOnly(extract("Workflow 3 : MED + Spikes")),
              wf4: getCheckedOnly(extract("Workflow 4 : Couleurs + AVG + Détection FR/Ripples")),
              wf5: getCheckedOnly(extract("Workflow 5 : Macro-référencement + 3 types d'évènements")),
              wf6_16: getCheckedOnly(extract("Workflows 6 à 16 (Cochez celui réalisé)")),
              verify: getCheckedOnly(extract("✅ A VÉRIFIER")),
              shortcuts: getCheckedOnly(extract("⌨️ Raccourcis annotation"))
            };

            for (const key in data) {
              core.setOutput(key, data[key]);
            }

      # GÉNÉRATION DU NOM DE FICHIER UNIQUE
      - name: Generate unique filename
        id: filename
        run: |
          TESTEUR="${{ steps.extract.outputs.testeur }}"
          DATE="${{ steps.extract.outputs.date }}"
          SAFE_TESTEUR=$(echo "$TESTEUR" | tr ' ' '_' | tr -cd '[:alnum:]_')
          SAFE_DATE=$(echo "$DATE" | tr -cd '0-9-')
          BASE_NAME="test_${SAFE_TESTEUR}_${SAFE_DATE}"
          FILE_NAME="${BASE_NAME}.md"
          INDEX=1
          while [ -f "test-sessions/${FILE_NAME}" ]; do
            INDEX=$((INDEX + 1))
            FILE_NAME="${BASE_NAME}_v${INDEX}.md"
          done
          echo "file=${FILE_NAME}" >> $GITHUB_OUTPUT

      # CRÉATION DU FICHIER MD AVEC STRUCTURE DÉTAILLÉE
      - name: Create markdown file
        run: |
          FILE="test-sessions/${{ steps.filename.outputs.file }}"
          mkdir -p test-sessions

          echo "# Rapport : ${{ steps.filename.outputs.file }}" > "$FILE"
          echo "" >> "$FILE"
          echo "## Informations générales" >> "$FILE"
          echo "- **Testeur :** ${{ steps.extract.outputs.testeur }}" >> "$FILE"
          echo "- **Date :** ${{ steps.extract.outputs.date }}" >> "$FILE"
          echo "- **Version Halyzia :** ${{ steps.extract.outputs.version }}" >> "$FILE"
          echo "" >> "$FILE"

          echo "## 📋 Détails de la traçabilité" >> "$FILE"

          # Affichage des sections uniquement si elles contiennent des cases cochées
          if [ ! -z "${{ steps.extract.outputs.wf1 }}" ]; then
            echo "### Workflow 1" >> "$FILE"
            echo "${{ steps.extract.outputs.wf1 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf2 }}" ]; then
            echo "### Workflow 2" >> "$FILE"
            echo "${{ steps.extract.outputs.wf2 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf3 }}" ]; then
            echo "### Workflow 3" >> "$FILE"
            echo "${{ steps.extract.outputs.wf3 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf4 }}" ]; then
            echo "### Workflow 4" >> "$FILE"
            echo "${{ steps.extract.outputs.wf4 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf5 }}" ]; then
            echo "### Workflow 5" >> "$FILE"
            echo "${{ steps.extract.outputs.wf5 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf6_16 }}" ]; then
            echo "### Workflows 6 à 16" >> "$FILE"
            echo "${{ steps.extract.outputs.wf6_16 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.verify }}" ]; then
            echo "### ✅ Vérifications générales" >> "$FILE"
            echo "${{ steps.extract.outputs.verify }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.shortcuts }}" ]; then
            echo "### ⌨️ Raccourcis" >> "$FILE"
            echo "${{ steps.extract.outputs.shortcuts }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          echo "## 📝 Observations" >> "$FILE"
          if [ -z "${{ steps.extract.outputs.notes }}" ] || [ "${{ steps.extract.outputs.notes }}" == "_No response_" ]; then
            echo "_Aucune observation particulière._" >> "$FILE"
          else
            echo "${{ steps.extract.outputs.notes }}" >> "$FILE"
          fi

      # COMMIT ET PUSH
      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add test-sessions/
          git commit -m "Add test session report: ${{ steps.filename.outputs.file }}"
          git push

      # FERMETURE DE L'ISSUE
      - name: Finalize Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🧪 Session de test exportée avec succès : `test-sessions/${{ steps.filename.outputs.file }}`."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });