name: Create Test Session File

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create-test-session:
    if: contains(github.event.issue.title, '[TEST SESSION]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # PARSING ROBUSTE PAR SECTION
      - name: Extract and Filter Fields
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            // Fonction d'extraction plus flexible (insensible à la casse et aux espaces)
            function extract(label) {
              const regex = new RegExp(`### ${label}[\\s\\S]*?\\n([\\s\\S]*?)(?=\\n###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            function getCheckedOnly(text) {
              if (!text) return "";
              return text.split('\n')
                .filter(line => line.trim().startsWith('- [x]'))
                .join('\n')
                .trim();
            }

            const data = {
              testeur: extract("Tester"),
              date: extract("Test Date"),
              version: extract("Tested version"),
              notes: extract("Notes and Observations"),
              wf1: getCheckedOnly(extract("Workflow 1")),
              wf2: getCheckedOnly(extract("Workflow 2")),
              wf3: getCheckedOnly(extract("Workflow 3")),
              wf4: getCheckedOnly(extract("Workflow 4")),
              wf5: getCheckedOnly(extract("Workflow 5")),
              wf6_16: getCheckedOnly(extract("Workflows 6 to 16")),
              verify: getCheckedOnly(extract("✅ To verify")),
              shortcuts: getCheckedOnly(extract("⌨️ Shortcuts"))
            };

            for (const key in data) {
              core.setOutput(key, data[key]);
            }

      # GÉNÉRATION DU NOM DE FICHIER UNIQUE (ANTI-ÉCRASEMENT)
      - name: Generate unique filename
        id: filename
        run: |
          TESTEUR="${{ steps.extract.outputs.testeur }}"
          DATE="${{ steps.extract.outputs.date }}"
          SAFE_TESTEUR=$(echo "$TESTEUR" | tr ' ' '_' | tr -cd '[:alnum:]_')
          SAFE_DATE=$(echo "$DATE" | tr -cd '0-9-')
          BASE_NAME="test_${SAFE_TESTEUR}_${SAFE_DATE}"
          FILE_NAME="${BASE_NAME}.md"
          INDEX=1
          while [ -f "test-sessions/${FILE_NAME}" ]; do
            INDEX=$((INDEX + 1))
            FILE_NAME="${BASE_NAME}_v${INDEX}.md"
          done
          echo "file=${FILE_NAME}" >> $GITHUB_OUTPUT

      # CRÉATION DU FICHIER MD DÉTAILLÉ
      - name: Create markdown file
        run: |
          FILE="test-sessions/${{ steps.filename.outputs.file }}"
          mkdir -p test-sessions

          echo "# Rapport de Session : ${{ steps.filename.outputs.file }}" > "$FILE"
          echo "" >> "$FILE"
          echo "## Informations générales" >> "$FILE"
          echo "- **Testeur :** ${{ steps.extract.outputs.testeur }}" >> "$FILE"
          echo "- **Date :** ${{ steps.extract.outputs.date }}" >> "$FILE"
          echo "- **Version Halyzia :** ${{ steps.extract.outputs.version }}" >> "$FILE"
          echo "" >> "$FILE"

          echo "## 📋 Traceability of performed steps" >> "$FILE"

          # Injection dynamique des sections si elles contiennent des éléments [x]
          if [ ! -z "${{ steps.extract.outputs.wf1 }}" ]; then
            echo "### Workflow 1" >> "$FILE"
            echo "${{ steps.extract.outputs.wf1 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf2 }}" ]; then
            echo "### Workflow 2" >> "$FILE"
            echo "${{ steps.extract.outputs.wf2 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf3 }}" ]; then
            echo "### Workflow 3" >> "$FILE"
            echo "${{ steps.extract.outputs.wf3 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf4 }}" ]; then
            echo "### Workflow 4" >> "$FILE"
            echo "${{ steps.extract.outputs.wf4 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf5 }}" ]; then
            echo "### Workflow 5" >> "$FILE"
            echo "${{ steps.extract.outputs.wf5 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.wf6_16 }}" ]; then
            echo "### Workflows 6 à 16" >> "$FILE"
            echo "${{ steps.extract.outputs.wf6_16 }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.verify }}" ]; then
            echo "### ✅ General verification" >> "$FILE"
            echo "${{ steps.extract.outputs.verify }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          if [ ! -z "${{ steps.extract.outputs.shortcuts }}" ]; then
            echo "### ⌨️ Shortcuts" >> "$FILE"
            echo "${{ steps.extract.outputs.shortcuts }}" >> "$FILE"
            echo "" >> "$FILE"
          fi

          echo "## 📝 Obserations" >> "$FILE"
          if [ -z "${{ steps.extract.outputs.notes }}" ] || [ "${{ steps.extract.outputs.notes }}" == "_No response_" ]; then
            echo "_Aucune observation particulière._" >> "$FILE"
          else
            echo "${{ steps.extract.outputs.notes }}" >> "$FILE"
          fi

      # COMMIT ET PUSH
      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add test-sessions/
          git commit -m "Add test session report: ${{ steps.filename.outputs.file }}"
          git push

      # FERMETURE DE L'ISSUE
      - name: Finalize Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🧪 Test session exported successfully : `test-sessions/${{ steps.filename.outputs.file }}`."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });