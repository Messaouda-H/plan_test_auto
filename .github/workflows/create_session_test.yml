name: Create Test Session File

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create-test-session:
    if: contains(github.event.issue.title, '[TEST SESSION]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # PARSING ET FILTRAGE DES TESTS COCHÉS
      - name: Extract and Filter Fields
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            // Fonction pour ne garder que les lignes cochées [x]
            function getCheckedOnly(text) {
              return text.split('\n')
                .filter(line => line.includes('[x]'))
                .join('\n')
                .trim();
            }

            // Extraction des blocs de workflows et tests
            const rawWorkflows = [
              extract("Workflow 1 : NEW + Détections complètes"),
              extract("Workflow 2 : Bipolaire + Ripples/FR"),
              extract("Workflow 3 : MED + Spikes"),
              extract("Workflow 4 : Couleurs + AVG + Détection FR/Ripples"),
              extract("Workflow 5 : Macro-référencement + 3 types d'évènements"),
              extract("Workflows 6 à 16 (Cochez celui réalisé)")
            ].join('\n');

            const data = {
              testeur: extract("Testeur"),
              date: extract("Date du test"),
              version: extract("Version testée"),
              notes: extract("Notes et Observations"),
              // On ne garde que ce qui est coché dans les workflows et vérifications
              checkedTests: getCheckedOnly(rawWorkflows),
              checkedVerify: getCheckedOnly(extract("✅ A VÉRIFIER")),
              checkedShortcuts: getCheckedOnly(extract("⌨️ Raccourcis annotation"))
            };

            for (const key in data) {
              core.setOutput(key, data[key]);
            }

      # NOM DE FICHIER : test_nomdutesteur_date.md
      - name: Generate safe filename
        id: filename
        run: |
          TESTEUR="${{ steps.extract.outputs.testeur }}"
          DATE="${{ steps.extract.outputs.date }}"
          
          # Nettoyage des caractères spéciaux pour le nom de fichier
          SAFE_TESTEUR=$(echo "$TESTEUR" | tr ' ' '_' | tr -cd '[:alnum:]_')
          SAFE_DATE=$(echo "$DATE" | tr -cd '0-9-')
          
          echo "file=test_${SAFE_TESTEUR}_${SAFE_DATE}.md" >> $GITHUB_OUTPUT

      # CRÉATION DU FICHIER MD
      - name: Create markdown file
        run: |
          FILE="test-sessions/${{ steps.filename.outputs.file }}"
          mkdir -p test-sessions

          echo "# Rapport de Session de Test" > "$FILE"
          echo "" >> "$FILE"
          echo "## Informations générales" >> "$FILE"
          echo "- **Testeur :** ${{ steps.extract.outputs.testeur }}" >> "$FILE"
          echo "- **Date :** ${{ steps.extract.outputs.date }}" >> "$FILE"
          echo "- **Version Halyzia :** ${{ steps.extract.outputs.version }}" >> "$FILE"
          echo "" >> "$FILE"

          echo "## Tests validés (Workflows)" >> "$FILE"
          if [ -z "${{ steps.extract.outputs.checkedTests }}" ]; then
            echo "_Aucun test de workflow coché._" >> "$FILE"
          else
            echo "${{ steps.extract.outputs.checkedTests }}" >> "$FILE"
          fi
          echo "" >> "$FILE"

          echo "## Points vérifiés" >> "$FILE"
          if [ -z "${{ steps.extract.outputs.checkedVerify }}" ]; then
            echo "_Aucun point de vérification coché._" >> "$FILE"
          else
            echo "${{ steps.extract.outputs.checkedVerify }}" >> "$FILE"
          fi
          echo "" >> "$FILE"

          echo "## Raccourcis testés" >> "$FILE"
          if [ -z "${{ steps.extract.outputs.checkedShortcuts }}" ]; then
            echo "_Aucun raccourci coché._" >> "$FILE"
          else
            echo "${{ steps.extract.outputs.checkedShortcuts }}" >> "$FILE"
          fi
          echo "" >> "$FILE"

          echo "## Observations" >> "$FILE"
          if [ -z "${{ steps.extract.outputs.notes }}" ] || [ "${{ steps.extract.outputs.notes }}" == "_No response_" ]; then
            echo "_Aucune observation particulière._" >> "$FILE"
          else
            echo "${{ steps.extract.outputs.notes }}" >> "$FILE"
          fi

      # COMMIT
      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add test-sessions/
          git commit -m "Add test session report: ${{ steps.filename.outputs.file }}"
          git push

      # COMMENTAIRE ET FERMETURE
      - name: Finalize Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Rapport généré avec succès : `test-sessions/${{ steps.filename.outputs.file }}`. Seuls les tests cochés ont été conservés."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });