name: Update Bug Report Dropdown

on:
  push:
    paths:
      - '.github/workflow-definitions/**'

permissions:
  contents: write

jobs:
  update:
    # ✅ Ignorer les pushs faits par le bot lui-meme — evite la boucle infinie
    if: github.actor != 'github-actions'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # ✅ Meme token que celui utilise pour pusher
          token: ${{ secrets.GPAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install js-yaml

      - name: Run script
        run: node .github/Scripts/update_bug_report.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .github/ISSUE_TEMPLATE/bug_report.yml
          git diff --staged --quiet && echo "Rien a committer" && exit 0
          git commit -m "chore: mise a jour automatique dropdown workflows"
          git push https://${{ secrets.GPAT }}@github.com/${{ github.repository }}.git HEAD:main
