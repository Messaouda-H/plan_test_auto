name: Update Bug Report Dropdown

on:
  push:
    paths:
      - '.github/workflow-definitions/**'  # Déclenche si un workflow.md est ajouté ou modifié

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml

      - name: Update bug_report.yml
        run: node .github/Scripts/update_bug_report.js

      - name: Commit and push changes
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add .
            git commit -m "Mise à jour automatique des workflows pour bug_report.yml" || echo "Rien à commit"
            git push origin HEAD:${{ github.ref }}
        env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}