name: Move Backlog → Test

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  move:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const issue = context.payload.issue;
            const label = context.payload.label.name;

            console.log("LABEL:", label);

            // Si on passe en dev
            if (label.toLowerCase().includes("dev")) {

              console.log("PASSAGE EN DEV");

              // 1. Ajouter Test
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["Test"]
              });

              // 2. Supprimer BackLog
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: "BackLog"
                });

                console.log("BackLog supprimé");
              } catch (e) {
                console.log("BackLog déjà absent");
              }

              console.log("Issue déplacée vers Test");
            }