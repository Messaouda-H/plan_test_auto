name: Move BackLog → Test

on:
  issues:
    types: [labeled]   

permissions:
  issues: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name.toLowerCase());

            console.log("Labels actuels :", labels);

            const isBacklog = labels.includes("backlog");
            const isDev     = labels.includes("status: dev");

            if (!isBacklog || !isDev) {
              console.log("Condition non remplie, rien à faire.");
              return;
            }

            console.log("→ Transition BackLog → Test");

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issue.number,
              labels: ["Test"]
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issue.number,
              name: "BackLog"
            });

            console.log("✓ Terminé");