name: Pilotage Temps Réel
on:
  issues:
    types: [opened]

jobs:
  inject-checklist:
    if: contains(github.event.issue.title, '[TEST SESSION]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        [cite_start]uses: actions/checkout@v4 [cite: 97]

      - name: Préparer les données
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body; [cite: 98]
            // On cherche le workflow entre guillemets (format actuel de ton issue)
            const match = body.match(/### Workflow testé\s*\n\n"(.+)"/); [cite: 101]
            const wfName = match ? match[1] : null;
            
            if (wfName) {
              const fs = require('fs');
              [cite_start]// Chemin basé sur ta structure existante [cite: 123]
              const path = `.github/workflow-definitions/${wfName}.md`; 
              
              if (fs.existsSync(path)) {
                const content = fs.readFileSync(path, 'utf8');
                [cite_start]// On extrait la partie après "Checklist des etapes" [cite: 82, 83]
                const parts = content.split(/## Checklist.*/i);
                if (parts.length > 1) {
                  const checklist = parts[1].split('##')[0].trim();
                  core.exportVariable('WF_CHECKLIST', checklist);
                }
              }
            }

      - name: Mettre à jour l'Issue
        if: env.WF_CHECKLIST != ''
        uses: actions/github-script@v7
        env:
          CHECKLIST_DATA: ${{ env.WF_CHECKLIST }}
        with:
          script: |
            const checklist = process.env.CHECKLIST_DATA; 
            const currentBody = context.payload.issue.body; [cite: 98]
            const newBody = `${currentBody}\n\n---\n### ✅ LISTE DE TÂCHES (À COCHER EN DIRECT)\n${checklist}`;
            
            [cite_start]await github.rest.issues.update({ [cite: 114]
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: newBody
            });