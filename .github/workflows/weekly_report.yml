name: Rapport hebdomadaire qualite

on:
  schedule:
    - cron: '0 8 * * 1'   # tous les lundis à 08:00
  workflow_dispatch:

permissions:
  contents: write  # pour commit/push

jobs:
  rapport:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generer rapport
        id: generate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const maintenant = new Date();
            const ilYaUneSemaine = new Date(maintenant.getTime() - 7*24*60*60*1000);

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'bug',
              state: 'all',
              since: ilYaUneSemaine.toISOString(),
              per_page: 100
            });

            const ouverts  = issues.filter(i => i.state === 'open');
            const fermes   = issues.filter(i => i.state === 'closed');
            const critiques = issues.filter(i => i.body && i.body.includes('Critique'));

            const fmt = d => d.toLocaleDateString('fr-FR');

            // Temps de résolution
            const resolutionTimes = fermes.filter(i => i.closed_at)
                                          .map(i => new Date(i.closed_at) - new Date(i.created_at));
            let avgResolution = resolutionTimes.length > 0
                                ? resolutionTimes.reduce((a,b)=>a+b,0)/resolutionTimes.length
                                : 0;
            const avgHours = Math.round(avgResolution / 3600000);

            // Bugs par version
            const bugsParVersion = {};
            issues.forEach(i => {
              const match = i.body?.match(/V\d+\.\d+\.\d+/);
              const version = match ? match[0] : "Inconnue";
              bugsParVersion[version] = (bugsParVersion[version] || 0) + 1;
            });
            const lignesVersions = Object.entries(bugsParVersion)
                                          .map(([v,n]) => `- ${v} : ${n}`)
                                          .join('\n') || 'Aucune donnée';

            // Listes bugs
            const lignes_ouverts = ouverts.length
              ? ouverts.map(i => `- [#${i.number} — ${i.title}](${i.html_url})`).join('\n')
              : '_Aucun bug ouvert_';

            const lignes_fermes = fermes.length
              ? fermes.map(i => `- [#${i.number} — ${i.title}](${i.html_url})`).join('\n')
              : '_Aucun bug resolu cette semaine_';

            const lignes_critiques = critiques.filter(i=>i.state==='open').length
              ? critiques.filter(i=>i.state==='open').map(i => `- [#${i.number} — ${i.title}](${i.html_url})`).join('\n')
              : '_Aucun bug critique ouvert_';

            const rapport = [
              `## 📊 Rapport qualite — semaine du ${fmt(ilYaUneSemaine)} au ${fmt(maintenant)}`,
              '',
              `| Metrique | Valeur |`,
              `|---|---|`,
              `| Bugs reportes | ${issues.length} |`,
              `| Bugs resolus  | ${fermes.length} |`,
              `| Bugs ouverts  | ${ouverts.length} |`,
              `| Bugs critiques ouverts | ${critiques.filter(i=>i.state==='open').length} |`,
              `| Temps moyen de resolution | ${avgHours || 0} h |`,
              '',
              `### 🔥 Bugs critiques ouverts`,
              lignes_critiques,
              '',
              `### 🐞 Bugs encore ouverts`,
              lignes_ouverts,
              '',
              `### ✅ Resolus cette semaine`,
              lignes_fermes,
              '',
              `### 📦 Bugs par version`,
              lignesVersions
            ].join('\n');

            return rapport;

      - name: Sauvegarder le rapport
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const rapport = ${{ toJSON(steps.generate.outputs.result) }};
            if (!fs.existsSync('reports')) fs.mkdirSync('reports');
            const filename = `reports/report-${new Date().toISOString().slice(0,10)}.md`;
            fs.writeFileSync(filename, rapport);
            console.log(`Rapport sauvegardé dans ${filename}`);

      - name: Commit et push rapport
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Ajout rapport hebdo" || echo "Rien à commit"
          git push