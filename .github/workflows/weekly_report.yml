name: Rapport hebdomadaire qualite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Generer rapport bugs
        uses: actions/github-script@v7
        with:
          script: |
            const issuesResponse = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "bug",
              state: "all"
            });

            const issues = issuesResponse.data;

            const ouverts = issues.filter(i => i.state === "open");
            const fermes = issues.filter(i => i.state === "closed");

            let rapport = "## Rapport qualite hebdomadaire\n\n";
            rapport += "Periode: 7 derniers jours\n\n";
            rapport += "Bugs reportes: " + issues.length + "\n";
            rapport += "Bugs resolus: " + fermes.length + "\n";
            rapport += "Bugs ouverts: " + ouverts.length + "\n\n";

            rapport += "### Bugs ouverts\n";
            if (ouverts.length === 0) {
              rapport += "Aucun\n";
            } else {
              ouverts.forEach(i => {
                rapport += "- #" + i.number + " — " + i.title + "\n";
              });
            }

            rapport += "\n### Bugs resolus\n";
            if (fermes.length === 0) {
              rapport += "Aucun\n";
            } else {
              fermes.forEach(i => {
                rapport += "- #" + i.number + " — " + i.title + "\n";
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Rapport qualite automatique",
              body: rapport
            });
