name: Rapport hebdomadaire qualite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Generer rapport bugs
        uses: actions/github-script@v7
        with:
          script: |
            const issuesResponse = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'bug',
              state: 'all'
            });

            const issues = issuesResponse.data;

            const ouverts = issues.filter(i => i.state === 'open');
            const fermes  = issues.filter(i => i.state === 'closed');

            const rapport = `## Rapport qualite hebdomadaire
            
Periode: 7 derniers jours
            
Bugs reportes: ${issues.length}
Bugs resolus: ${fermes.length}
Bugs ouverts: ${ouverts.length}
            
### Bugs ouverts
${ouverts.map(i => `- #${i.number} — ${i.title}`).join('\\n') || 'Aucun'}
            
### Bugs resolus
${fermes.map(i => `- #${i.number} — ${i.title}`).join('\\n') || 'Aucun'}
`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Rapport qualite automatique",
              body: rapport
            });
