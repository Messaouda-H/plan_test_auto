name: Bug Report
description: Signale un bug rencontré pendant les tests Halyzia
title: '[BUG] '
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire clairement.  
        L’issue sera automatiquement traitée par le Kanban et le rapport hebdo !

  - type: input
    id: version
    attributes:
      label: Version de Halyzia
      description: Exemple : 1.2.3
      placeholder: 1.2.3
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: Workflow utilisé
      description: Liste mise à jour automatiquement
      options:
        - Sélectionnez un workflow...
        - WF-01 — NEW + Detection
        - WF-02 — Export PDF
        - WF-03 — Import CSV
    validations:
      required: true

  - type: input
    id: fichier
    attributes:
      label: Fichier / Module concerné
      placeholder: export.py ou main_workflow
    validations:
      required: true

  - type: input
    id: pc
    attributes:
      label: Configuration PC / Environnement
      description: OS, navigateur, version, etc.
      placeholder: Windows 11 • Chrome 124
    validations:
      required: true

  - type: input
    id: testeur
    attributes:
      label: Nom du testeur
    validations:
      required: true

  - type: dropdown
    id: severite
    attributes:
      label: Sévérité
      options:
        - Critique (bloquant)
        - Haute
        - Moyenne
        - Basse
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
    validations:
      required: true

  - type: textarea
    id: etapes
    attributes:
      label: Étapes pour reproduire
      value: |
        1. 
        2. 
    validations:
      required: true

  - type: textarea
    id: resultat_attendu
    attributes:
      label: Résultat attendu
    validations:
      required: true

  - type: textarea
    id: resultat_reel
    attributes:
      label: Résultat réel
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Merci ! L’issue sera placée automatiquement dans le Kanban.
