name: Créer un workflow de test
description: Formulaire simple pour ajouter un nouveau workflow
title: "[WF] "
labels: ["workflow"]

body:
  - type: input
    id: nom
    attributes:
      label: Nom du workflow
      placeholder: ex. WF-15 — Test export EEG
    validations:
      required: true

  - type: textarea
    id: objectif
    attributes:
      label: Objectif du test
      placeholder: Décrire le but du workflow

  - type: textarea
    id: checklist
    attributes:
      label: Étapes du test
      description: Une étape par ligne
      placeholder: |
        NEW > charger fichier
        Appliquer filtre
        Vérifier affichage