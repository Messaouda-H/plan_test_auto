name: Session de test
description: Suivi complet d'une session de test
title: "[TEST SESSION] "
labels: ["test-session", "status: in-progress"]

body:

  - type: input
    id: testeur
    attributes:
      label: Testeur
    validations:
      required: true

  - type: input
    id: date_test
    attributes:
      label: Date du test
      placeholder: YYYY-MM-DD
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version testée
      placeholder: ex. 2.0.0.4
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: Workflow testé
      options:
        - WF-01
        - WF-02
        - Autre
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Workflow exécuté (tests prédéfinis)
      description: Cocher UNIQUEMENT les étapes du workflow
      placeholder: |
        - [ ] Étape 1
        - [ ] Étape 2
        - [ ] Étape 3

  - type: textarea
    id: extra_tests
    attributes:
      label: Tests supplémentaires (hors workflow)
      description: Tests libres ajoutés par le testeur
      placeholder: |
        - [ ] Test export PDF
        - [ ] Test performance

  - type: textarea
    id: notes
    attributes:
      label: Notes libres
      placeholder: Observations, idées, bugs

  - type: checkboxes
    id: validation
    attributes:
      label: Validation finale
      options:
        - label: Tous les tests ont été exécutés
        - label: Les résultats sont validés
        - label: La session est complète ✅
    validation:
      required: true