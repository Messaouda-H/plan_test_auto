name: Issue Test
description: Signaler un bug detecte pendant les tests Halyzia
title: 'Issue Test'
labels:
  - Test
  - "status : todo"
assignees:
  - NOM_DU_DEV_PAR_DEFAUT
body:
  - type: markdown
    attributes:
      value: |
        ## Signalement de bug — Halyzia
        Remplir tous les champs. Le bug sera automatiquement
        assigne et suivi dans le tableau de bord.
  - type: dropdown
    id: version
    attributes:
      label: Version Halyzia concernee
      options:
        - V1.7.1
        - V1.7.1.RC2
        - V1.7.1.RC1
        - V1.7.0.6
        - V1.7.0.5
        - V1.7.0.4
        - Autre
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow en cours quand le bug est apparu
      description: |
        Voir les definitions completes dans .github/workflow-definitions/
      options:
        - '""'
        - '"26-03"'
        - '".github/ISSUE_TEMPLATE/workflow_test.yml"'
        - '"Workflow 1 — NEW + Detection complete"'
        - '"Workflow 2 — Bipolaire + Detection Ripples/FR"'
        - '"abcd"'
        - '"ddd"'
        - '"me"'
        - '"test"'
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Format du fichier EEG utilise
      options:
        - .ncs
        - .edf
        - .TRC
        - .ns5
        - .medd
        - .nsc
        - Autre
    validations:
      required: true
  - type: input
    id: fichier
    attributes:
      label: Nom du fichier teste
      placeholder: ex. P110_DP002-sieste_micmac-ncs
    validations:
      required: true
  - type: input
    id: pc
    attributes:
      label: PC utilise
      placeholder: ex. MSI / LAPTOP-LQFVND1H / Mac
    validations:
      required: true
  - type: input
    id: testeur
    attributes:
      label: Testeur
      placeholder: ex.  Halissath 
    validations:
      required: true
  - type: dropdown
    id: severite
    attributes:
      label: Severite
      options:
        - Critique — crash / perte de donnees
        - Majeur — fonctionnalite bloquee
        - Mineur — comportement incorrect mais contournable
        - Cosmétique — affichage seulement
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      placeholder: Decrivez precisement ce qui s'est passe...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Etapes pour reproduire
      placeholder: |
        1. Ouvrir Halyzia V1.7.1
        2. NEW > selectionner dossier X
        3. Appliquer filtre permanent...
        4. Observer le bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultat attendu
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultat obtenu
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Lignes d'erreur (copier-coller depuis le terminal)
      render: shell
  - type: dropdown
    id: os
    attributes:
      label: Systeme d'exploitation
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Autre
  - type: dropdown
    id: assignee_choice
    attributes:
      label: Assigner à
      description: Choisir la personne responsable
      options:
        - Halissath
        - Messaouda
    validations:
      required: true