name: Issue Test
description: Signaler une annomalie detecte pendant les tests Halyzia
title: Issue Test
labels:
  - Test
  - 'status: todo'

body:
  - type: markdown
    attributes:
      value: |
        ## Signalement d'annomalie — Halyzia
        Remplir tous les champs. Le bug sera automatiquement
        assigne et suivi dans le tableau de bord.
  
  - type: input
    id: version
    attributes:
      label: Version Halyzia
      placeholder: ex. V1.7.1
    validations:
      required: true
  - type: dropdown
    id: sessiontest
    attributes:
      label: La session test en cours quand l'annomalie est apparue
      description: |
        Voir les definitions completes dans PLAN_TEST_AUTO/test-sessions/
      options:
        - Autre
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Format du fichier EEG utilise
      options:
        - .ncs
        - .edf
        - .TRC
        - .ns5
        - .medd
        - .nsc
        - Autre
    validations:
      required: true
  - type: textarea
    id: test_data
    attributes:
      label: Lien vers dossier/fichier de test
      description: >-
        Lien vers dossier (Drive, serveur, zip, etc.) ou glissez-déposez vos
        fichiers ici
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: pc
    attributes:
      label: PC utilise
      placeholder: ex. MSI / LAPTOP-LQFVND1H / Mac
    validations:
      required: true
  - type: input
    id: testeur
    attributes:
      label: Testeur
      placeholder: ex.  Halissath
    validations:
      required: true
  - type: dropdown
    id: severite
    attributes:
      label: Severite
      options:
        - Critique — crash / perte de donnees
        - Majeur — fonctionnalite bloquee
        - Mineur — comportement incorrect mais contournable
        - Cosmétique — affichage seulement
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      placeholder: Decrivez precisement ce qui s'est passe...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Etapes pour reproduire
      placeholder: |
        1. Ouvrir Halyzia V1.7.1
        2. NEW > selectionner dossier X
        3. Appliquer filtre permanent...
        4. Observer le bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultat attendu
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultat obtenu
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Lignes d'erreur (copier-coller depuis le terminal)
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran
      description: Glissez-déposez vos captures d'écran ici (ou collez-les directement).
      placeholder: Ajoutez une ou plusieurs captures d'écran
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Systeme d'exploitation
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Autre
  - type: dropdown
    id: assignee_choice
    attributes:
      label: Assigner à
      description: Choisir la personne responsable
      options:
        - Halissath
        - Messaouda
    validations:
      required: true
