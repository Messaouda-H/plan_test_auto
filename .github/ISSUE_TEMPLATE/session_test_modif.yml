name: Session de Test - Workflows 2.0
description: Formulaire complet avec tous les workflows et vérifications détaillés.
title: "[TEST SESSION] "
labels: ["Fichiers", "test-session"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 Instructions de test
        Cochez les étapes du workflow que vous réalisez, puis complétez la section **"A vérifier"** en bas de page.

  - type: input
    id: tester
    attributes:
      label: Nom du Testeur
      placeholder: ex. Messaouda
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version Halyzia testée
      placeholder: ex. 2.0.0.6
    validations:
      required: true

  - type: checkboxes
    id: wf1
    attributes:
      label: "Workflow 1 : NEW + Détections complètes"
      options:
        - label: "NEW"
        - label: "Ajustement des paramètres d’affichage"
        - label: "Zoom et scroll dans le signal"
        - label: "Masquer puis montrer les lignes de graduation temporelle"
        - label: "PSD et marquage de quelques signaux as bad"
        - label: "Hide canaux marqué as bad"
        - label: "hide un canal macro"
        - label: "Modifier l’amplitude de quelques canaux (2 micros et 3macro)"
        - label: "lancer le scalogramme (macro et micro)"
        - label: "appliquer un filtre visuel sur les canaux modifiés (600Hz max)"
        - label: "appliquer un filtre permanent que sur les macros (IIR-0,1-1023Hz -None)"
        - label: "monter l’électrode micro en set tétrode"
        - label: "passer en mode annotation"
        - label: "annoter le signal (events manuels biomarqueurs, other events, texte libre, 2 notes)"
        - label: "supprimer une note et une annotation other event"
        - label: "Déplacer les évènements à l’aide de la molette de la souris"
        - label: "appliquer un filtre visuel sur micro (50Hz max)"
        - label: "lancer les détections Avrio (all, not hidden, sélection macroA,B,B_sub et 2 micro)"
        - label: "Masquer puis afficher des évènements"
        - label: "Plier puis déplier des évènements"
        - label: "lancer les 3 eventviewer : afficher que les events manuels"
        - label: "Labéliser les events manuels"
        - label: "Filtrer sur les events manuels"
        - label: "export métriques"
        - label: "lancer les 5 cartes topo (events manuels seuls, puis deux types + filtres)"
        - label: "Appliquer le hourly rate"

  - type: checkboxes
    id: wf2
    attributes:
      label: "Workflow 2 : Bipolaire + Ripples/FR"
      options:
        - label: "NEW"
        - label: "Ajustement des paramètres d’affichage"
        - label: "Zoom et scroll dans le signal"
        - label: "PSD et marquage de quelques signaux as bad"
        - label: "appliquer un filtre permanent sur tous les canaux (5-600Hz-Notch)"
        - label: "monter l’électrode micro montage AVG avec rattachement à un macro"
        - label: "Hide canaux marqué as bad"
        - label: "hide un canal micro"
        - label: "Modifier l’amplitude de quelques canaux (2 micros et 3macro)"
        - label: "lancer le scalogramme (macro et micro)"
        - label: "annoter le signal (2 artefact macro/micro, events biomarqueurs, 2 notes)"
        - label: "supprimer une note et un event biomarqueur"
        - label: "appliquer un filtre visuel sur macro (600Hz max)"
        - label: "passer en bipolaire"
        - label: "Lancer PSD"
        - label: "lancer les détections sur les Ripples et FR (Avrio MedTech)"
        - label: "Détection sur les spikes (Janca)"
        - label: "Masquer puis afficher des évènements"
        - label: "Plier puis déplier des évènements"
        - label: "lancer les 3 event viewer (deux types d'event, labéliser et filtres)"
        - label: "export métriques"
        - label: "lancer les 5 cartes topo et appliquer les filtres"

  - type: checkboxes
    id: wf3
    attributes:
      label: "Workflow 3 : MED + Spikes"
      options:
        - label: "NEW"
        - label: "Ajustement des paramètres d’affichage"
        - label: "Zoom et scroll dans le signal"
        - label: "PSD et marquage de quelques signaux as bad"
        - label: "Hide canaux marqué as bad"
        - label: "Hide un canal macro"
        - label: "passer en MED"
        - label: "Lancer PSD"
        - label: "Appliquer un filtre visuel IIR sur tous les signaux"
        - label: "lancer les détections de spikes (Janca)"
        - label: "annoter le signal (2 artefact macro/micro, 5 biomarqueurs dont 2 hors zone)"
        - label: "supprimer une note et un event biomarqueur (dans zone auto)"
        - label: "lancer le scalogramme"
        - label: "Masquer les notes"
        - label: "plier les spikes"
        - label: "lancer l’eventviewer"
        - label: "export métriques"
        - label: "monter l’électrode micro montage MED avec rattachement macro"
        - label: "lancer la carte topo (filtres + hourly rate, vérifier retrait events hors zone)"

  - type: checkboxes
    id: wf4
    attributes:
      label: "Workflow 4 : Couleurs + AVG + Détection FR/Ripples"
      options:
        - label: "NEW"
        - label: "Ajustement paramètres affichage"
        - label: "Zoom et scroll"
        - label: "PSD + marquage bad"
        - label: "hide un canal macro"
        - label: "Changer la couleur d'un canal macro et micro"
        - label: "Lancer le scalogramme"
        - label: "Annoter (Events manuels, notes, artefacts - supprimer note et artefact micro)"
        - label: "Filtre permanent sur macros (FIR 200-600Hz-Notch)"
        - label: "Filtre visuel sur micro (FIR 600Hz max)"
        - label: "Montage référencement micro + rattachement macro"
        - label: "Passer en mode AVG"
        - label: "Détections FR et Ripples"
        - label: "Lancer les 2 eventviewer"
        - label: "Export métriques"
        - label: "Lancer les 2 cartes topo + filtres"

  - type: checkboxes
    id: wf5
    attributes:
      label: "Workflow 5 : Macro-référencement + 3 types d'évènements"
      options:
        - label: "NEW"
        - label: "Ajustement paramètres affichage"
        - label: "Montage AVG sans rattachement macros"
        - label: "Marquer macro as bad"
        - label: "Hide un canal macro"
        - label: "Passer en macro-référencement"
        - label: "Lancer PSD"
        - label: "Modifier amplitude (2 micros / 3 macros)"
        - label: "Détections sur les 3 types d'events (détecteurs différents)"
        - label: "Filtre visuel (FIR 50Hz sur sélection)"
        - label: "Lancer scalogramme"
        - label: "Ajuster amplitude via panel haut/droite"
        - label: "Lancer event viewers"
        - label: "Lancer 5 cartes topo"
        - label: "Export CSV"

  - type: checkboxes
    id: wf6_16
    attributes:
      label: "Workflows 6 à 16 (Cochez celui réalisé)"
      options:
        - label: "WF 6 : Persistance (Fermer/Rouvrir Halyzia)"
        - label: "WF 7 : Redétection overlap + Carte topo"
        - label: "WF 8 : Concaténation bipolaire/monopolaire"
        - label: "WF 9 : Écraser un dossier existant (NEW)"
        - label: "WF 10 : Mi-enregistrement + Hourly rate"
        - label: "WF 11 : Changement emplacement source"
        - label: "WF 12 : Double clic TRC/EDF (Ouverture rapide)"
        - label: "WF 13 : Conservation analyses (Tous dossiers)"
        - label: "WF 14 : Ouverture dossier ancienne version"
        - label: "WF 15 : Fréquence < 1200Hz"
        - label: "WF 16 : Fréquence <= 500Hz + Warning"

  - type: checkboxes
    id: averifier
    attributes:
      label: "✅ A VÉRIFIER"
      options:
        - label: "Double cliquer sur un canal hors mode annotation"
        - label: "Entrer en mode annotation"
        - label: "Rajouter des annotation biomarqueurs"
        - label: "Rajouter others events (label prédéfinit et texte personnalisé)"
        - label: "Rajouter des notes"
        - label: "Quitter mode annotation : conservation évènements"
        - label: "Supprimer évènements en mode annotation : sauvegarde ok"
        - label: "Passer en mode annotation dans tous les montages"
        - label: "Lancer une détection après rajout annotations"
        - label: "Vérifier affichage annotations barre navigation"
        - label: "Vérifier affichage notes barre navigation"
        - label: "Copier-coller évènements auto"
        - label: "Event viewer : events manuels seuls + filtres"
        - label: "Performance : affichage, labélisation, filtres"
        - label: "Texte libre (spike/FR/Ripples) non compté dans biomarqueurs"
        - label: "Artefact en bipolaire avant détection"
        - label: "Copier-coller un artefact"
        - label: "Artefact dupliqué en passage bipolaire"
        - label: "Ajouter artefact en bipolaire"
        - label: "Passer monopolaire : absence artefact sur canaux impliqués"
        - label: "Ajout artefact après détection : disparition event viewer/export"
        - label: "Texte libre 'artefact' : pas d'effet réel"
        - label: "Carte topo : events manuels seul + filtres"
        - label: "Hourly rate : annotation hors zone vs zone auto"
        - label: "Carte topo sans évènements auto + hourly rate"
        - label: "Générer carte topo évènements combinées"
        - label: "Event display : plier/déplier, cacher/afficher"
        - label: "Menu Save as : export csv"
        - label: "Changer amplitude canal puis passage bipolaire"
        - label: "Ajuster amplitude panel (haut/gauche) après modif manuelle"
        - label: "Succession de deux détecteurs différents : archivage ok"
        - label: "Normaliser scalogramme dans event viewer : performance"
        - label: "Masquage évènements : disparition barre navigation"
        - label: "Filtre visuel grisé si barre déjà ouverte"
        - label: "Switch menu filtre (Permanent/Visuel) : fermeture automatique"

  - type: checkboxes
    id: raccourcis
    attributes:
      label: "⌨️ Raccourcis annotation"
      options:
        - label: "Tab (rotation horaire)"
        - label: "Shift + Tab (anti-horaire)"
        - label: "Enter (valider type)"
        - label: "Enter (liste labels) + flèches navigation"
        - label: "Affichage zones artefactées dans carte topo"

  - type: textarea
    id: notes
    attributes:
      label: "Notes et Observations"
      placeholder: "Décrivez ici les anomalies ou comportements observés..."